name: Auto PR Creator

on:
  push:
    branches-ignore:
      - main
  # 手動実行は必ず "Use workflow from: main" を選択すること
  workflow_dispatch:
    inputs:
      head_branch:
        description: "PR にするブランチ名（リストにない場合は直接入力も可）"
        required: true
        type: choice
        options:
          - feature/test-infra-1-testcontainers-setup
          - feature/test-infra-2-user-repo-test
          - feature/test-infra-3-period-objective-kr-test
          - feature/test-infra-4-usecase-mock-test
          - feature/observability-1-otel-setup
          - feature/observability-2-tracing
          - other
      base_branch:
        description: "マージ先ブランチ"
        required: false
        default: "main"
        type: choice
        options:
          - main

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout main (scripts always from main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch head branch
        run: git fetch origin ${{ inputs.head_branch || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install groq

      - name: Resolve branch names
        run: |
          HEAD="${{ inputs.head_branch || github.ref_name }}"
          if [ "$HEAD" = "other" ]; then
            echo "❌ 'other' を選択した場合はブランチ名を直接入力してください" >&2
            exit 1
          fi
          echo "HEAD_BRANCH=$HEAD"                          >> $GITHUB_ENV
          echo "BASE_BRANCH=${{ inputs.base_branch || 'main' }}" >> $GITHUB_ENV

      - name: Generate diff (vs base branch)
        run: |
          git diff origin/${{ env.BASE_BRANCH }}...origin/${{ env.HEAD_BRANCH }} \
            -- . \
            ':(exclude)*.sum' \
            ':(exclude)*.lock' \
            ':(exclude)node_modules/**' \
            > diff.txt
          echo "diff lines: $(wc -l < diff.txt)"

      - name: Get commit log
        run: |
          LOG=$(git log origin/${{ env.BASE_BRANCH }}..origin/${{ env.HEAD_BRANCH }} --oneline)
          echo "COMMIT_LOG<<EOF" >> $GITHUB_ENV
          echo "$LOG"           >> $GITHUB_ENV
          echo "EOF"            >> $GITHUB_ENV

      - name: Create PR with AI-generated description
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT:       ${{ secrets.GH_PAT }}
          HEAD_BRANCH:  ${{ env.HEAD_BRANCH }}
          BASE_BRANCH:  ${{ env.BASE_BRANCH }}
          REPO:         ${{ github.repository }}
          COMMIT_LOG:   ${{ env.COMMIT_LOG }}
        run: python scripts/auto_pr.py
